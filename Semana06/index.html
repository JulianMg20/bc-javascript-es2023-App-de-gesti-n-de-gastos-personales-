<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>💰 Validador de Gastos | Semana 06</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <header class="header">
      <h1>💰 Registro de Gasto Personal</h1>
      <p>Semana 06 - Validación con RegExp</p>
    </header>

    <form id="expense-form" novalidate>

      <!-- Nombre -->
      <div class="form-group" id="group-name">
        <label for="name">👤 Nombre Completo</label>
        <input type="text" id="name"
          placeholder="Ej: Juan Pérez" autocomplete="off" />
        <span class="feedback" id="feedback-name"></span>
      </div>

      <!-- Email -->
      <div class="form-group" id="group-email">
        <label for="email">📧 Correo Electrónico</label>
        <input type="email" id="email"
          placeholder="Ej: juan@gmail.com" autocomplete="off" />
        <span class="feedback" id="feedback-email"></span>
      </div>

      <!-- Teléfono -->
      <div class="form-group" id="group-phone">
        <label for="phone">📱 Teléfono</label>
        <input type="text" id="phone"
          placeholder="Ej: +57 300 123 4567"
          autocomplete="off" maxlength="16" />
        <span class="feedback" id="feedback-phone"></span>
      </div>

      <!-- Contraseña -->
      <div class="form-group" id="group-password">
        <label for="password">🔒 Contraseña</label>
        <input type="password" id="password"
          placeholder="Mínimo 8 caracteres" autocomplete="off" />
        <div class="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
        <span class="strength-label" id="strength-label"></span>
        <span class="feedback" id="feedback-password"></span>
      </div>

      <!-- Confirmar Contraseña -->
      <div class="form-group" id="group-confirm">
        <label for="confirm">🔒 Confirmar Contraseña</label>
        <input type="password" id="confirm"
          placeholder="Repite tu contraseña" autocomplete="off" />
        <span class="feedback" id="feedback-confirm"></span>
      </div>

      <!-- Fecha -->
      <div class="form-group" id="group-date">
        <label for="date">📅 Fecha del Gasto (DD/MM/YYYY)</label>
        <input type="text" id="date"
          placeholder="Ej: 15/03/2025"
          autocomplete="off" maxlength="10" />
        <span class="feedback" id="feedback-date"></span>
      </div>

      <!-- Monto -->
      <div class="form-group" id="group-amount">
        <label for="amount">💰 Monto del Gasto</label>
        <input type="text" id="amount"
          placeholder="Ej: 35000" autocomplete="off" />
        <span class="feedback" id="feedback-amount"></span>
      </div>

      <!-- Categoría -->
      <div class="form-group" id="group-category">
        <label for="category">📁 Categoría</label>
        <select id="category">
          <option value="">Selecciona una categoría...</option>
          <option value="food">🍔 Alimentación</option>
          <option value="transport">🚌 Transporte</option>
          <option value="entertainment">🎬 Entretenimiento</option>
          <option value="health">💊 Salud</option>
        </select>
        <span class="feedback" id="feedback-category"></span>
      </div>

      <!-- Descripción -->
      <div class="form-group" id="group-description">
        <label for="description">📝 Descripción</label>
        <input type="text" id="description"
          placeholder="Ej: Almuerzo en restaurante"
          autocomplete="off" maxlength="100" />
        <span class="feedback" id="feedback-description"></span>
      </div>

      <!-- Botón -->
      <button type="submit" class="btn-submit" id="btn-submit" disabled>
        Registrar Gasto
      </button>

      <!-- Éxito -->
      <div class="success-message hidden" id="success-message">
        ✅ ¡Gasto registrado correctamente!
      </div>

    </form>
  </div>

  <script src="./starter/script.js"></script>
</body>
</html>
